{{define "new_jobtype"}}
{{template "layout_start" map "Title" "New Job Type"}}
    <a href="/producers/view?id={{.Producer.ProducerId}}" class="back-link">&larr; Back to {{.Producer.Name}}</a>
    <h1 style="margin-bottom: 8px;">New Job Type</h1>
    <p style="color: var(--gray-600); margin-bottom: 32px;">For producer: <strong>{{.Producer.Name}}</strong></p>

    <div class="form-card">
        {{if .Error}}<div class="error-msg">{{.Error}}</div>{{end}}
        <form method="POST" action="/jobtypes/create">
            <input type="hidden" name="producer_id" value="{{.Producer.ProducerId}}">
            <div class="form-group">
                <label>Name</label>
                <input type="text" name="name" required placeholder="e.g., send_email">
            </div>
            <div class="form-group">
                <label>Queue</label>
                <select name="queue" required>
                    <option value="1">Immediate (SLA: 5s)</option>
                    <option value="2">High (SLA: 15s)</option>
                    <option value="3" selected>Medium (SLA: 1m)</option>
                    <option value="4">Low (SLA: 5m)</option>
                </select>
            </div>
            <div class="form-group">
                <label>Max Retries</label>
                <input type="number" name="max_retries" value="3" min="0">
            </div>
            <div class="form-group">
                <label>Description</label>
                <textarea name="description" rows="3" placeholder="Optional description"></textarea>
            </div>
            <div class="form-actions">
                <button type="submit" class="btn">Create Job Type</button>
                <a href="/producers/view?id={{.Producer.ProducerId}}" class="btn btn-secondary">Cancel</a>
            </div>
        </form>
    </div>
{{template "layout_end"}}
{{end}}
