# Cloud Build configuration for jack-service deployment.
#
# Variables are set via the Cloud Build Trigger configuration for each environment.
steps:
  # Run integration tests (gates deployment)
  - id: integration-test
    name: golang:1.25.10-bookworm
    entrypoint: bash
    args:
      - -c
      - |
        set -e

        # Install Java (Pub/Sub emulator dependency) and gcloud
        apt-get update -qq
        apt-get install -y -qq apt-transport-https ca-certificates gnupg curl default-jre-headless netcat-openbsd
        curl -fsSL https://packages.cloud.google.com/apt/doc/apt-key.gpg | \
          gpg --dearmor -o /usr/share/keyrings/cloud.google.gpg
        echo "deb [signed-by=/usr/share/keyrings/cloud.google.gpg] https://packages.cloud.google.com/apt cloud-sdk main" \
          > /etc/apt/sources.list.d/google-cloud-sdk.list
        apt-get update -qq
        apt-get install -y -qq google-cloud-cli google-cloud-cli-pubsub-emulator

        # Start Pub/Sub emulator in background
        gcloud beta emulators pubsub start --host-port=0.0.0.0:8085 &
        for i in $$(seq 1 30); do
          nc -z localhost 8085 2>/dev/null && break
          sleep 1
        done
        export PUBSUB_EMULATOR_HOST=localhost:8085

        # Run all tests (unit + integration)
        go test -tags integration -v -timeout 120s ./...

  # Build the container image
  - id: build
    name: gcr.io/cloud-builders/docker
    waitFor: [integration-test]
    args:
      - build
      - --build-arg
      - COMMIT_SHA=${COMMIT_SHA}
      - -t
      - ${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPOSITORY}/${_SERVICE}:${COMMIT_SHA}
      - -t
      - ${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPOSITORY}/${_SERVICE}:latest
      - .

  # Push the container image to Artifact Registry
  - id: push
    name: gcr.io/cloud-builders/docker
    args:
      - push
      - --all-tags
      - ${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPOSITORY}/${_SERVICE}

  # Deploy to Cloud Run
  - id: deploy
    name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: bash
    args:
      - -c
      - |
        gcloud run services update ${_SERVICE} \
          --platform=managed \
          --image=${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPOSITORY}/${_SERVICE}:${COMMIT_SHA} \
          --region=${_DEPLOY_REGION} \
          --port=50051 \
          --use-http2 \
          --update-labels=commit-sha=${COMMIT_SHA} \
          --update-env-vars=COMMIT_SHA=${COMMIT_SHA},DD_SERVICE=${_SERVICE},DD_VERSION=${COMMIT_SHA},DD_GIT_COMMIT_SHA=${COMMIT_SHA},DD_GIT_REPOSITORY_URL=${_REPO} \
          --quiet && \
        gcloud run services update-traffic ${_SERVICE} --region=${_DEPLOY_REGION} --to-latest --quiet

  # Record deployment in Datadog
  - id: datadog-record-deployment
    name: gcr.io/cloud-builders/curl
    waitFor: [deploy]
    allowFailure: true
    entrypoint: 'curl'
    timeout: 10s
    args:
      - '-v'
      - '--header'
      - 'Content-Type: application/json'
      - '--header'
      - 'DD-API-Key: ${_DATADOG_API_KEY}'
      - 'https://api.us5.datadoghq.com/api/v1/events'
      - '--data'
      - |
        {
          "title": "%%%Jack Service deployed ([${SHORT_SHA}](https://github.com/clerk/jack-service/commit/${COMMIT_SHA}))%%%",
          "alert_type": "info",
          "source_type_name": "google cloud run",
          "tags": ["type:deployment", "service:jack-service", "environment:${_CLERK_ENV}"]
        }

substitutions:
  _REGION: us-central1
  _DEPLOY_REGION: us-central1
  _REPOSITORY: jack
  _SERVICE: jack-service
  _REPO: 'github.com/clerk/jack-service'
  _CLERK_ENV: staging

options:
  logging: CLOUD_LOGGING_ONLY
  dynamicSubstitutions: true

timeout: 1200s # 20 minutes
