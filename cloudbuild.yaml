# Cloud Build configuration for jack-service deployment.
#
# Variables are set via the Cloud Build Trigger configuration for each environment.
steps:
  # Build the container image
  - id: build
    name: gcr.io/cloud-builders/docker
    args:
      - build
      - --build-arg
      - COMMIT_SHA=${COMMIT_SHA}
      - -t
      - ${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPOSITORY}/${_SERVICE}:${COMMIT_SHA}
      - -t
      - ${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPOSITORY}/${_SERVICE}:latest
      - .

  # Push the container image to Artifact Registry
  - id: push
    name: gcr.io/cloud-builders/docker
    args:
      - push
      - --all-tags
      - ${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPOSITORY}/${_SERVICE}

  # Deploy to Cloud Run
  - id: deploy
    name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: bash
    args:
      - -c
      - |
        gcloud run services update ${_SERVICE} \
          --platform=managed \
          --image=${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPOSITORY}/${_SERVICE}:${COMMIT_SHA} \
          --region=${_DEPLOY_REGION} \
          --update-labels=commit-sha=${COMMIT_SHA} \
          --set-env-vars=COMMIT_SHA=${COMMIT_SHA},DD_SERVICE=${_SERVICE},DD_VERSION=${COMMIT_SHA},DD_GIT_COMMIT_SHA=${COMMIT_SHA},DD_GIT_REPOSITORY_URL=${_REPO} \
          --quiet && \
        gcloud run services update-traffic ${_SERVICE} --region=${_DEPLOY_REGION} --to-latest --quiet

  # Record deployment in Datadog
  - id: datadog-record-deployment
    name: gcr.io/cloud-builders/curl
    waitFor: [deploy]
    allowFailure: true
    entrypoint: 'curl'
    timeout: 10s
    args:
      - '-v'
      - '--header'
      - 'Content-Type: application/json'
      - '--header'
      - 'DD-API-Key: ${_DATADOG_API_KEY}'
      - 'https://api.us5.datadoghq.com/api/v1/events'
      - '--data'
      - |
        {
          "title": "%%%Jack Service deployed ([${SHORT_SHA}](https://github.com/clerk/jack-service/commit/${COMMIT_SHA}))%%%",
          "alert_type": "info",
          "source_type_name": "google cloud run",
          "tags": ["type:deployment", "service:jack-service", "environment:${_CLERK_ENV}"]
        }

substitutions:
  _REGION: us-central1
  _DEPLOY_REGION: us-central1
  _REPOSITORY: jack
  _SERVICE: jack-service
  _REPO: 'github.com/clerk/jack-service'
  _CLERK_ENV: staging

options:
  logging: CLOUD_LOGGING_ONLY
  dynamicSubstitutions: true

timeout: 1200s # 20 minutes
