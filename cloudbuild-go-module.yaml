# Cloud Build configuration for publishing proto-generated Go client to Artifact Registry.
#
# Triggered by pushing a semver tag (e.g. v0.1.0).
# Generates proto Go code from .proto files and publishes proto/jackpb/
# as a standalone Go module to the go-modules AR repository.
steps:
  # Generate proto code and publish as Go module
  - id: publish-go-module
    name: golang:1.25.6-bookworm
    entrypoint: bash
    args:
      - -c
      - |
        set -e

        # Install buf
        go install github.com/bufbuild/buf/cmd/buf@latest
        export PATH="$$(go env GOPATH)/bin:$$PATH"

        # Generate proto code (buf.yaml and buf.gen.yaml are in repo root)
        buf generate

        # Install gcloud + AR upload tool
        apt-get update -qq && apt-get install -y -qq apt-transport-https ca-certificates gnupg curl
        curl -fsSL https://packages.cloud.google.com/apt/doc/apt-key.gpg | gpg --dearmor -o /usr/share/keyrings/cloud.google.gpg
        echo "deb [signed-by=/usr/share/keyrings/cloud.google.gpg] https://packages.cloud.google.com/apt cloud-sdk main" > /etc/apt/sources.list.d/google-cloud-sdk.list
        apt-get update -qq && apt-get install -y -qq google-cloud-cli google-cloud-sdk-package-go-module

        # Upload thin client to Artifact Registry
        gcloud artifacts go upload \
          --project=${PROJECT_ID} \
          --repository=${_GO_REPOSITORY} \
          --location=${_REGION} \
          --module-path=github.com/clerk/jack-service/proto/jackpb \
          --version=${TAG_NAME} \
          --source=proto/jackpb

substitutions:
  _REGION: us-central1
  _GO_REPOSITORY: go-modules

options:
  logging: CLOUD_LOGGING_ONLY
  dynamicSubstitutions: true

timeout: 600s # 10 minutes
